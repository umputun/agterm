name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      swift: ${{ steps.filter.outputs.swift }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            swift:
              - "**/*.swift"
              - "agtermCore/**"
              - "agterm/**"
              - "project.yml"
              - "scripts/**"
              - ".swiftlint.yml"
              - "agtermUITests/.swiftlint.yml"
              - ".github/workflows/ci.yml"

  test:
    name: Unit tests
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: swift test (with coverage)
        working-directory: agtermCore
        run: swift test --enable-code-coverage
      - name: export lcov
        working-directory: agtermCore
        # rewrite the absolute SF: paths llvm-cov emits to repo-relative so the
        # separate linux coverage job can resolve them against its own checkout
        run: |
          BIN=$(swift build --show-bin-path)
          xcrun llvm-cov export \
            "$BIN/agtermCorePackageTests.xctest/Contents/MacOS/agtermCorePackageTests" \
            -instr-profile "$BIN/codecov/default.profdata" \
            -format=lcov \
            -ignore-filename-regex='(\.build|Tests|checkouts)/' \
            | sed "s|SF:$GITHUB_WORKSPACE/|SF:|g" > coverage.lcov
      - name: upload lcov artifact
        # coverage is best-effort: a transient artifact-service outage must not
        # red the build when the tests themselves passed
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: agtermCore/coverage.lcov

  coverage:
    name: Coverage upload
    needs: [changes, test]
    if: needs.changes.outputs.swift == 'true'
    # the coveralls action installs its reporter via a brew tap on macOS (now blocked
    # by homebrew's tap-trust gate); on linux it downloads a binary, so upload here
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        # the upload side is best-effort; if the artifact never landed, don't fail
        # this job either — the coveralls submit below is already continue-on-error
        continue-on-error: true
        with:
          name: coverage-lcov
      - name: submit coverage to coveralls
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage.lcov
          format: lcov

  lint:
    name: swiftlint
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Install swiftlint
        run: brew install swiftlint
      - name: swiftlint (strict)
        run: swiftlint lint --strict

  build:
    name: Build app
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Cache libghostty (GhosttyKit + resources)
        uses: actions/cache@v6
        with:
          path: |
            GhosttyKit.xcframework
            agterm/Resources/ghostty
            agterm/Resources/terminfo
          key: ghosttykit-${{ hashFiles('scripts/setup.sh') }}
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build libghostty + app (Release)
        run: scripts/build.sh
