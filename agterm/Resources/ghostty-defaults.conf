# agterm built-in terminal defaults, loaded before ~/.config/ghostty/config so the
# user's own config still overrides them. widens libghostty's default 2px inner
# padding to 8px horizontally and 6px vertically.
window-padding-x = 8
window-padding-y = 6

# keep the cursor a steady block everywhere. the shell-integration `cursor`
# feature otherwise flips it to a bar at the prompt and back to a block while a
# command runs, which reads as an inconsistent cursor; no-cursor stops the shell
# from emitting the shape-change escapes so it stays at the block default.
#
# no-title stops ghostty's shell integration from auto-setting the terminal title
# to the abbreviated cwd on every prompt (the `…/a/b/c` path), which would always
# override the sidebar's cwd-basename name. explicit titles still win: a remote
# host over SSH, or a PROMPT_COMMAND emitting OSC 2, set the session's oscTitle and
# the sidebar shows that — we just don't auto-title local shells with the path.
cursor-style = block
shell-integration-features = no-cursor,no-title

# make ⌘C/⌘V copy/paste work on non-Latin keyboard layouts. libghostty's built-in
# clipboard binds are unicode triggers (`super+c`/`super+v`), matched against the
# character the active layout produces — so on a Russian/Greek/etc. layout the
# physical V key yields `м`/etc. and the bind never fires. these physical-key
# triggers match by keycode (the physical position) regardless of the produced
# character, so copy/paste work on any layout. performable: keeps ghostty's default
# fall-through (e.g. ⌘C does nothing when there is no selection). a Latin alternative
# layout (Dvorak/Colemak) that wants its own letter positions can re-bind these in
# ~/.config/agterm/ghostty.conf.
keybind = performable:super+key_c=copy_to_clipboard
keybind = performable:super+key_v=paste_from_clipboard
